<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lluvia de Ideas ☁️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Orbes decorativos -->
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <!-- Nubes de ideas flotando por todo el cielo -->
  <div class="sky" id="sky"></div>

  <!-- UI flotante sin caja -->
  <div class="ui">

    <!-- Personaje pensando -->
    <div class="thinker-wrap">
      <img class="thinker-img" src="personaje.png" alt="Persona pensando">
    </div>

    <!-- Título -->
    <div class="header">
      <h1>Lluvia de Ideas</h1>
      <p class="subtitle">¿Qué crees que es el <strong>brainstorming</strong>?</p>
    </div>

    <!-- Input flotante -->
    <div class="input-area">
      <input type="text" id="idea" placeholder="Escribe tu idea y lánzala al cielo..." maxlength="120" autocomplete="off">
      <button id="btn-enviar" onclick="enviarIdea()">
        <span class="btn-label">Lanzar</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Stats pill -->
    <div class="stats-pill">
      <span>☁️ <strong id="total">0</strong> ideas en el cielo</span>
      <span class="live-dot">● En vivo</span>
    </div>

    <!-- Botón análisis -->
    <button class="btn-analisis" id="btn-analisis" onclick="generarAnalisis()">
      ✨ Analizar todas las ideas
    </button>

    <!-- Resultado -->
    <div class="resultado-wrap" id="resultado-wrap">
      <div class="resultado">
        <div class="resultado-title">💡 Análisis del grupo</div>
        <div id="resultado-texto"></div>
      </div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
