<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lluvia de Ideas ☁️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Orbes decorativos -->
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <!-- Nubes de ideas flotando por todo el cielo -->
  <div class="sky" id="sky"></div>

  <!-- UI flotante sin caja -->
  <div class="ui">

    <!-- Personaje pensando -->
    <div class="thinker-wrap">
      <svg class="thinker-svg" viewBox="0 0 220 200" fill="none" xmlns=" https://chatgpt.com/backend-api/estuary/content?id=file_00000000718871f597c6a07b01891395&ts=492335&p=fs&cid=1&sig=f892d6e5f9b0a78c1453146bdd4d59874871effc8b56ebe14e39b72727e42ad0&v=0">
        <ellipse cx="110" cy="185" rx="45" ry="12" fill="rgba(108,99,255,0.10)"/>
        <path d="M100 160 Q97 172 92 180" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
        <path d="M120 160 Q122 172 118 180" stroke="#a78bfa" stroke-width="5" stroke-linecap="round"/>
        <rect x="90" y="120" width="40" height="42" rx="14" fill="#c4b5fd"/>
        <path d="M90 130 Q75 148 78 158" stroke="#a78bfa" stroke-width="5.5" stroke-linecap="round"/>
        <path d="M130 130 Q145 140 140 152" stroke="#a78bfa" stroke-width="5.5" stroke-linecap="round"/>
        <circle cx="78" cy="160" r="6" fill="#a78bfa"/>
        <rect x="104" y="108" width="12" height="16" rx="5" fill="#c4b5fd"/>
        <circle cx="110" cy="94" r="28" fill="#ede9fe"/>
        <circle cx="110" cy="94" r="28" fill="url(#headGrad)"/>
        <path d="M100 90 Q103 87 106 90" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M114 90 Q117 87 120 90" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M104 100 Q110 105 116 100" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" fill="none"/>
        <path d="M99 84 Q103 81 107 83" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <path d="M113 83 Q117 80 121 82" stroke="#7c3aed" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        <circle cx="148" cy="72" r="4" fill="#c4b5fd" opacity="0.8">
          <animate attributeName="cy" values="72;64;72" dur="2s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.8;1;0.8" dur="2s" repeatCount="indefinite"/>
        </circle>
        <circle cx="162" cy="56" r="6.5" fill="#a78bfa" opacity="0.65">
          <animate attributeName="cy" values="56;46;56" dur="2.4s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.65;1;0.65" dur="2.4s" repeatCount="indefinite"/>
        </circle>
        <circle cx="180" cy="36" r="10" fill="#7c3aed" opacity="0.45">
          <animate attributeName="cy" values="36;24;36" dur="2.9s" repeatCount="indefinite"/>
          <animate attributeName="opacity" values="0.45;0.85;0.45" dur="2.9s" repeatCount="indefinite"/>
        </circle>
        <path d="M83 90 Q82 70 95 62 Q110 54 125 62 Q138 70 137 88" fill="#7c3aed" opacity="0.85"/>
        <path d="M83 90 Q80 80 84 74" stroke="#7c3aed" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M95 125 L110 135 L125 125" stroke="white" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.4"/>
        <defs>
          <radialGradient id="headGrad" cx="40%" cy="35%" r="60%">
            <stop offset="0%" stop-color="rgba(255,255,255,0.4)"/>
            <stop offset="100%" stop-color="rgba(196,181,253,0)"/>
          </radialGradient>
        </defs>
      </svg>
    </div>

    <!-- Título -->
    <div class="header">
      <h1>Lluvia de Ideas</h1>
      <p class="subtitle">¿Qué crees que es el <strong>brainstorming</strong>?</p>
    </div>

    <!-- Input flotante -->
    <div class="input-area">
      <input type="text" id="idea" placeholder="Escribe tu idea y lánzala al cielo..." maxlength="120" autocomplete="off">
      <button id="btn-enviar" onclick="enviarIdea()">
        <span class="btn-label">Lanzar</span>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Stats pill -->
    <div class="stats-pill">
      <span>☁️ <strong id="total">0</strong> ideas en el cielo</span>
      <span class="live-dot">● En vivo</span>
    </div>

    <!-- Botón análisis -->
    <button class="btn-analisis" id="btn-analisis" onclick="generarAnalisis()">
      ✨ Analizar todas las ideas
    </button>

    <!-- Resultado -->
    <div class="resultado-wrap" id="resultado-wrap">
      <div class="resultado">
        <div class="resultado-title">💡 Análisis del grupo</div>
        <div id="resultado-texto"></div>
      </div>
    </div>

  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
