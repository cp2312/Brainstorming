<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lluvia de Ideas ☁️</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Nubes flotan aquí -->
  <div class="sky" id="sky"></div>

  <!-- PANTALLA DE ENTRADA (se oculta al enviar) -->
  <div class="entrada" id="entrada">
    <img class="personaje" src="personaje.png" alt="Pensando">
    <h1>Lluvia de Ideas</h1>
    <p class="subtitle">¿Qué crees que es el <strong>brainstorming</strong>?</p>
    <div class="input-row">
      <input type="text" id="idea" placeholder="Escribe tu idea..." maxlength="120" autocomplete="off">
      <button id="btn-enviar" onclick="enviarIdea()">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>
    <p class="hint">Presiona Enter o el botón para lanzar tu idea al cielo ☁️</p>
  </div>

  <!-- PANTALLA DE NUBES (visible tras enviar) -->
  <div class="cielo-ui" id="cielo-ui">
    <div class="stats-badge">
      ☁️ <strong id="total">0</strong> ideas &nbsp;·&nbsp; <span class="live-dot">● En vivo</span>
    </div>
    <div class="controles">
      <button class="btn-ctrl btn-analizar" onclick="solicitarAccion('analisis')">✨ Analizar</button>
      <button class="btn-ctrl btn-reiniciar" onclick="solicitarAccion('reinicio')">🗑️ Reiniciar</button>
    </div>
  </div>

  <!-- Panel resultado -->
  <div class="resultado-wrap" id="resultado-wrap">
    <div class="resultado-header">
      <span>💡 Análisis del grupo</span>
      <button onclick="document.getElementById('resultado-wrap').classList.remove('visible')">✕</button>
    </div>
    <div id="resultado-texto"></div>
  </div>

  <!-- Modal clave -->
  <div class="modal-overlay" id="modal-overlay">
    <div class="modal">
      <div id="modal-icon" style="font-size:2.2rem;margin-bottom:8px">🔐</div>
      <h3 id="modal-title">Acceso restringido</h3>
      <p id="modal-subtitle">Ingresa la clave para continuar</p>
      <input type="password" id="modal-input" placeholder="••••" maxlength="10">
      <div class="modal-error" id="modal-error">Clave incorrecta ❌</div>
      <div class="modal-btns">
        <button class="m-cancel" onclick="cerrarModal()">Cancelar</button>
        <button class="m-ok" onclick="confirmarModal()">Entrar</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
